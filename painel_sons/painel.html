<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jazz DJ Mixer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Jazz Club Mixer</h1>
    
    <div id="mixer-panel">
        
        <div class="channel">
            <button class="play-btn" id="start-bass">Start Bass</button>
            
            <input type="range" id="bass-fader" class="volume-fader" min="0" max="1" step="0.01" value="0">
            
            <p>Upright Bass</p>
        </div>

    </div>

    <script src="painel.js"></script>
</body>
</html>
